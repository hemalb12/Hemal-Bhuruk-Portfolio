<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hemal Bhuruk | Portfolio</title>
    <style>
        :root {
            --primary-bg: #FAF5FF; /* Soft Lavender Pearl */
            --charcoal: #1E293B;   /* Corporate Charcoal */
            --cyan: #06B6D4;       /* Cyber Cyan */
            --text-muted: #64748B;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--primary-bg); color: var(--charcoal); line-height: 1.6; }
        .container { max-width: 950px; margin: 0 auto; padding: 60px 20px; }

        /* Get In Touch Grid */
        .contact-section { padding: 40px 0; }
        .contact-section h2 { font-size: 2.5rem; margin-bottom: 40px; color: var(--charcoal); }
        
        .contact-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
        }

        .contact-card {
            background: #FFFFFF;
            border: 1px solid rgba(30, 41, 59, 0.1);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .contact-card:hover { border-color: var(--cyan); box-shadow: 0 8px 20px rgba(6, 182, 212, 0.1); }
        
        .icon-wrapper {
            background: rgba(6, 182, 212, 0.1);
            color: var(--cyan);
            width: 50px; height: 50px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }

        .info span { display: block; }
        .label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .value { font-weight: 700; font-size: 1.1rem; }

        @media (max-width: 768px) { .contact-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<section id="contact" class="container contact-section">
    <h2>Get In Touch</h2>
    <div class="contact-grid">
        <div class="contact-card">
            <div class="icon-wrapper">📍</div>
            <div class="info">
                <span class="label">Location</span>
                <span class="value">Mumbai, India</span>
            </div>
        </div>

        <a href="mailto:hbhuruk274@gmail.com" class="contact-card">
            <div class="icon-wrapper">📧</div>
            <div class="info">
                <span class="label">Email</span>
                <span class="value">hbhuruk274@gmail.com</span>
            </div>
        </a>

        <a href="#" target="_blank" class="contact-card">
            <div class="icon-wrapper">🔗</div>
            <div class="info">
                <span class="label">LinkedIn</span>
                <span class="value">Connect with me</span>
            </div>
        </a>

        <a href="#" target="_blank" class="contact-card">
            <div class="icon-wrapper">💻</div>
            <div class="info">
                <span class="label">GitHub</span>
                <span class="value">github.com/hemal-bhuruk</span>
            </div>
        </a>
    </div>
</section>

</body>
</html>
